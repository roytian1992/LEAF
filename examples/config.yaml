llm:
  provider: openai
  model_name: your-answer-model
  api_key: your-api-key
  base_url: http://your-answer-endpoint/v1

embedding:
  provider: openai
  model_name: your-embedding-model
  api_key: your-api-key
  base_url: http://your-embedding-endpoint/v1

additional_llm:
  provider: openai
  model_name: your-memory-model
  api_key: your-memory-model-key
  base_url: http://your-memory-model-endpoint/v1

ingest:
  mode: online
  migration_refresh_derived: true
  migration_build_entity_facets: false
  migration_build_entity_bridges: false
  migration_bridge_mode: hybrid
